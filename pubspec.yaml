name: mysafar_sdk
description: MySafar travel booking SDK — embeddable avia search/booking, visa, destinations and news flows.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.0.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.7
  get_storage: ^2.1.1
  provider: ^6.0.5
  dio: ^5.9.0
  # bloc 7.2+ (on<Event> API) dan 9.x gacha — Unired hozircha 7/9 oralig'ida.
  bloc: '>=7.2.0 <10.0.0'
  mask_text_input_formatter: ^2.9.0
  google_sign_in: ^7.2.0
  webview_flutter: ^4.2.4
  flutter_bloc: '>=7.3.0 <10.0.0'
  intl: ^0.20.2
  # Diapazon keng — host app (masalan Unired 32.x) bilan to'qnashmasligi uchun.
  syncfusion_flutter_datepicker: '>=29.1.35 <35.0.0'
  firebase_core: '>=3.13.0 <5.0.0'
  firebase_auth: '>=5.7.0 <7.0.0'
  country_list_pick: ^1.0.1+6
  shimmer: ^3.0.0
  image_picker: ^1.1.2
  collection: ^1.18.0
  syncfusion_flutter_calendar: '>=29.1.37 <35.0.0'
  url_launcher: ^6.2.4
  flutter_slidable: ^4.0.0
  cached_network_image: ^3.4.1
  # cached_network_image transitiv keltiradi; rasm keshini sqflite o'rniga
  # JSON repository bilan sozlash uchun to'g'ridan-to'g'ri e'lon qilingan.
  flutter_cache_manager: ^3.4.1
  package_info_plus: '>=8.3.0 <11.0.0'
  equatable: ^2.0.7
  decimal: ^3.2.4
  fluttertoast: '>=8.2.12 <10.0.0'
  # open_file emas open_filex: host applar (Unired) open_filex ishlatadi va
  # ikkalasi bir xil native klasslarni beradi (dex to'qnashuvi).
  open_filex: ^4.7.0
  path: ^1.9.1
  path_provider: ^2.1.5
  pinput: '>=5.0.1 <7.0.0'
  connectivity_plus: '>=6.1.4 <8.0.0'
  lottie: ^3.1.0
  flutter_staggered_grid_view: ^0.7.0
  expandable_page_view: ^1.0.17
  latlong2: '>=0.9.0 <0.11.0'
  permission_handler: '>=11.3.1 <13.0.0'
  mrz_parser: ^2.0.1
  audio_waveforms: ^2.0.1
  flutter_animate: ^4.5.2
  pixel_snap: ^0.1.5
  record: '>=6.0.0 <8.0.0'
  # 4.x'da qoladi: 5.x runtime'da pigeon->analyzer tortadi va host applarning
  # codegen to'plami (hive_generator, analyzer pin) bilan to'qnashadi.
  geocoding: ^4.0.0
  location: ^8.0.1
  google_maps_flutter: ^2.12.3
  google_places_flutter: ^2.1.1
  telegram_login: ^1.1.0
  myid: ^3.1.41
  flutter_earth_globe: ^2.2.1
  showcaseview: ^5.1.0
  cloud_firestore: '>=5.6.12 <7.0.0'
  # Lokal kesh (news, recommendation endpointlari va boshqa remote config)
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  shared_preferences: ^2.5.5

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/img/auth/
    - assets/img/home/
    - assets/img/home/backgrounds/
    - assets/img/home/icons/
    - assets/img/profile/
    - assets/img/splash/
    - assets/img/booking/
    - assets/img/tickets/
    - assets/img/flags/
    - assets/img/tickets/airlines/
    - assets/img/
    - assets/anim/
    - assets/fonts/
    - assets/fonts/Gilroy/
    - assets/lang/
    - assets/data/

  fonts:
    - family: CustomIcons
      fonts:
        - asset: assets/img/home/CustomIcons.ttf
    - family: Gilroy
      fonts:
        - asset: assets/fonts/Gilroy/Bold.ttf
          weight: 700
        - asset: assets/fonts/Gilroy/Medium.ttf
          weight: 500
        - asset: assets/fonts/Gilroy/Regular.ttf
          weight: 400
        - asset: assets/fonts/Gilroy/SemiBold.ttf
          weight: 600

